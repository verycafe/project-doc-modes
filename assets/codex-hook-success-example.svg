<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Codex Hook install and trust flow</title>
  <desc id="desc">A five-step Codex project hook flow: paste the hook install instruction, bind project files, trust the hook in Codex settings, ensure project-doc-modes docs are initialized, then let Stop hook run sync and verify.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#10151f" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#7aa7ff"/>
    </marker>
    <style>
      .bg{fill:#10131b}
      .panel{fill:#1d202b}
      .panel2{fill:#242834}
      .card{fill:#181b24;stroke:#353b49;stroke-width:1.6}
      .ok{fill:#143a2b;stroke:#45cc82;stroke-width:1.8}
      .warn{fill:#3a2f17;stroke:#f0b84f;stroke-width:1.8}
      .blue{fill:#182640;stroke:#6c9cff;stroke-width:1.8}
      .pill{fill:#343946}
      .pill-ok{fill:#153f2d;stroke:#3cc77b;stroke-width:1.3}
      .pill-warn{fill:#443316;stroke:#f0b84f;stroke-width:1.3}
      .title{font:800 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f5f7fb}
      .subtitle{font:500 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#c8cfdd}
      .step{font:800 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f4f7fb}
      .body{font:600 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#eef2f8}
      .small{font:500 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd2df}
      .tiny{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#b7bfce}
      .mono{font:600 18px "SFMono-Regular","Cascadia Code","Menlo",monospace;fill:#eef2f8}
      .mono-small{font:600 16px "SFMono-Regular","Cascadia Code","Menlo",monospace;fill:#e7edf6}
      .accent{fill:#77d7a8}
      .warning-dot{fill:#f0b84f}
      .number{font:800 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#10131b}
    </style>
  </defs>

  <rect width="1600" height="980" class="bg"/>

  <g filter="url(#shadow)">
    <rect x="70" y="54" width="1460" height="850" rx="26" class="panel"/>
    <rect x="70" y="54" width="1460" height="76" rx="26" class="panel2"/>
    <circle cx="108" cy="92" r="10" fill="#ff6464"/>
    <circle cx="140" cy="92" r="10" fill="#ffc85a"/>
    <circle cx="172" cy="92" r="10" fill="#59d98e"/>
    <text x="224" y="101" class="title">Codex 项目 Hook 安装与生效流程</text>
    <text x="880" y="101" class="subtitle">默认绑定当前项目；全局绑定必须显式写 scope=global</text>

    <g transform="translate(116 170)">
      <rect x="0" y="0" width="1368" height="114" rx="18" class="card"/>
      <circle cx="42" cy="42" r="18" fill="#7aa7ff"/>
      <text x="42" y="50" text-anchor="middle" class="number">1</text>
      <text x="78" y="43" class="step">在目标项目里粘贴安装指令</text>
      <text x="78" y="80" class="mono">Fetch and follow instructions from https://raw.githubusercontent.com/verycafe/project-doc-modes/main/hooks.md</text>
      <text x="1086" y="43" class="tiny">不要在 Skill 仓库外误绑其他项目</text>
    </g>

    <g transform="translate(116 326)">
      <rect x="0" y="0" width="642" height="160" rx="18" class="ok"/>
      <circle cx="42" cy="44" r="18" fill="#77d7a8"/>
      <text x="42" y="52" text-anchor="middle" class="number">2</text>
      <text x="78" y="52" class="step">Installer 返回 bound=True</text>
      <text x="78" y="91" class="small">创建或更新当前仓库里的项目级 Hook 文件：</text>
      <rect x="78" y="108" width="208" height="34" rx="8" class="pill"/>
      <text x="94" y="130" class="mono-small">.codex/hooks.json</text>
      <rect x="304" y="108" width="292" height="34" rx="8" class="pill"/>
      <text x="320" y="130" class="mono-small">.codex/hooks/project_doc_modes_stop.py</text>

      <path d="M664 80 L704 80" stroke="#7aa7ff" stroke-width="5" marker-end="url(#arrow)"/>

      <rect x="728" y="0" width="640" height="160" rx="18" class="warn"/>
      <circle cx="770" cy="44" r="18" fill="#f0b84f"/>
      <text x="770" y="52" text-anchor="middle" class="number">3</text>
      <text x="806" y="52" class="step">用户去项目 Hook 配置里点信任</text>
      <text x="806" y="91" class="small">Codex 会把非 managed command hook 标成需要 review。</text>
      <rect x="806" y="108" width="388" height="34" rx="8" class="pill-warn"/>
      <text x="824" y="130" class="mono-small">设置 -> 钩子 -> 当前项目 -> Stop -> 信任</text>
      <text x="1210" y="130" class="tiny">这不是第二条安装命令</text>
    </g>

    <g transform="translate(116 542)">
      <rect x="0" y="0" width="642" height="190" rx="18" class="blue"/>
      <circle cx="42" cy="44" r="18" fill="#7aa7ff"/>
      <text x="42" y="52" text-anchor="middle" class="number">4</text>
      <text x="78" y="52" class="step">生效前提：项目文档结构已初始化</text>
      <text x="78" y="91" class="small">目标项目需要先跑过 project-doc-modes 初始化或迁移。</text>
      <rect x="78" y="112" width="134" height="34" rx="8" class="pill"/>
      <text x="94" y="134" class="mono-small">AGENTS.md</text>
      <rect x="228" y="112" width="132" height="34" rx="8" class="pill"/>
      <text x="244" y="134" class="mono-small">CLAUDE.md</text>
      <rect x="376" y="112" width="166" height="34" rx="8" class="pill"/>
      <text x="392" y="134" class="mono-small">docs/README.md</text>
      <text x="78" y="170" class="tiny">如果这些入口不存在，Hook 只提示先初始化，不会自动迁移文档。</text>

      <path d="M664 96 L704 96" stroke="#7aa7ff" stroke-width="5" marker-end="url(#arrow)"/>

      <rect x="728" y="0" width="640" height="190" rx="18" class="card"/>
      <circle cx="770" cy="44" r="18" fill="#77d7a8"/>
      <text x="770" y="52" text-anchor="middle" class="number">5</text>
      <text x="806" y="52" class="step">会话结束时 Stop hook 才进入 sync + verify</text>
      <text x="806" y="91" class="small">读取本轮会话、git status、diff 摘要和验证输出。</text>
      <rect x="806" y="112" width="176" height="34" rx="8" class="pill-ok"/>
      <text x="824" y="134" class="mono-small">sync + verify</text>
      <rect x="1000" y="112" width="254" height="34" rx="8" class="pill"/>
      <text x="1018" y="134" class="mono-small">continue_sync_verify</text>
      <text x="806" y="170" class="tiny">只更新本地活跃治理文档，不改代码、不 stage、不 commit、不 push。</text>
    </g>

    <g transform="translate(116 792)">
      <rect x="0" y="0" width="1368" height="64" rx="16" fill="#151923" stroke="#333946" stroke-width="1.4"/>
      <circle cx="30" cy="32" r="7" class="warning-dot"/>
      <text x="54" y="39" class="body">安装成功不等于立即生效：必须先信任当前项目的 Hook，并且目标项目已经有 project-doc-modes 的活跃文档结构。</text>
    </g>
  </g>
</svg>
